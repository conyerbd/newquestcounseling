<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Profile - New Quest Counseling</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            padding: 20px;
        }

        .profile {
            width: 512px;
            height: 512px;
            background-color: #ffffff;
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile img {
            width: 75%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="profile" id="profile-capture-area">
        <img src="../ads/logo.svg" alt="New Quest Counseling Logo">
    </div>
</body>
</html>
