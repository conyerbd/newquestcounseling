<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Banner - New Quest Counseling</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            padding: 20px;
        }

        .banner {
            width: 820px;
            height: 462px;
            background-color: #ffffff;
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 30px;
            font-family: 'Nunito', sans-serif;
            border: none;
        }

        .logo {
            width: 320px;
            height: auto;
            margin-bottom: 5px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #002D62;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .highlight {
            color: #FF4C8B;
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .highlight::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #FFD100;
            z-index: -1;
            border-radius: 5px;
        }

        .subtext {
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #4B5563;
            text-align: center;
        }

        /* Dashed accent line along the bottom */
        .banner::after {
            content: '';
            position: absolute;
            bottom: 16px;
            left: 40px;
            right: 40px;
            border-top: 4px dashed #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="banner" id="banner-capture-area">
        <img class="logo" src="../ads/logo.svg" alt="New Quest Counseling Logo">
        <h1>Life didn't come with a <span class="highlight">walkthrough.</span></h1>
        <p class="subtext">Specialized Therapy for Geeks &amp; Gamers</p>
    </div>

</body>
</html>
