<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Quest Counseling Ad - Vertical</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #002D62;
            padding: 20px;
        }

        .ad-container {
            width: 1080px;
            height: 1920px;
            background-color: #ffffff;
            background-image: radial-gradient(#d1d5db 3px, transparent 3px);
            background-size: 40px 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 250px 70px 300px;
            color: #002D62;
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            border: none;
            border-radius: 0;
        }

        /* Logo styling */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-container img {
            width: 80%;
            height: auto;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 100px;
            font-weight: 700;
            line-height: 1.1;
            color: #002D62;
        }

        .highlight {
            color: #FF4C8B;
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .highlight::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: 22px;
            background-color: #FFD100;
            z-index: -1;
            border-radius: 10px;
        }

        p.subtitle {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.4;
            color: #4B5563;
        }

        .subtext {
            font-family: 'Fredoka', sans-serif;
            font-size: 36px;
            font-weight: 600;
            color: #FF4C8B;
            margin-top: 40px;
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
            border-top: 5px dashed #cbd5e1;
            padding-top: 40px;
            margin-top: 40px;
        }

        .tagline {
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            color: #002D62;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            padding: 22px 60px;
            background-color: #FFD100;
            color: #002D62;
            font-family: 'Fredoka', sans-serif;
            font-size: 36px;
            font-weight: 700;
            border-radius: 20px;
            border: 5px solid #002D62;
            box-shadow: 0 8px 0 #002D62;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .url {
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            color: #002D62;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="ad-container" id="ad-capture-area">

        <div class="logo-container">
            <img src="logo.svg" alt="New Quest Counseling Logo">
        </div>

        <div class="content">
            <h1>Life didn't come <br>with a <span class="highlight">walkthrough.</span></h1>

            <p class="subtitle">
                But you don't have to play solo. <br>
                Upgrade your mental health and unlock your potential with <strong>a guide that gets you.</strong>
            </p>
        </div>

        <p class="subtext">Specialized Therapy for Geeks &amp; Gamers.</p>

        <div class="bottom-bar">
            <div class="tagline">Level Up Your Mental Health</div>
            <div class="btn">Start Your Quest</div>
        </div>

    </div>

</body>
</html>
